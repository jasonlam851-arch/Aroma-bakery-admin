<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aroma_bakery | 管理中央主控台</title>
  <style>
    :root {
      --sb-green-dark: #1e3932;
      --sb-green-light: #006241;
      --sb-accent-gold: #cba258;
      --sb-gray-bg: #f2f0eb;
      --sb-gray-card: #ffffff;
      --sb-border: #dbd9d3;
      --sb-text-black: #212529;
      --sb-text-muted: #6c757d;
      --sb-danger: #b02a37;
      --sb-warning: #ffc107;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', 'Noto Serif TC', serif; background-color: var(--sb-gray-bg); color: var(--sb-text-black); min-height: 100vh; letter-spacing: 0.5px; }
    
    /* 登入介面 */
    #admin-auth-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(30, 57, 50, 0.85), rgba(30, 57, 50, 0.85)), url('https://images.unsplash.com/photo-1544787219-7f47ccb76574?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
      background-size: cover; z-index: 1000; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease;
    }
    .admin-container { background: #ffffff; padding: 45px; width: 90%; max-width: 440px; box-shadow: 0 20px 45px rgba(0,0,0,0.3); border-top: 5px solid var(--sb-accent-gold); }
    .admin-title-main { font-size: 22px; font-weight: 700; color: var(--sb-green-dark); text-align: center; margin-bottom: 5px; letter-spacing: 1px; }
    .admin-subtitle-main { font-size: 11px; color: var(--sb-accent-gold); text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--sb-green-dark); letter-spacing: 0.5px; }
    input, select, textarea { width: 100%; padding: 13px 16px; border: 1px solid var(--sb-border); font-size: 14px; background-color: #ffffff; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--sb-green-light); }
    
    /* 彈窗控制按鈕 */
    .btn { padding: 10px 20px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
    .btn-primary { background-color: var(--sb-green-dark); color: white; }
    .btn-primary:hover { background-color: var(--sb-green-light); }
    .btn-warning { background-color: var(--sb-warning); color: #000; }
    .btn-danger { background-color: var(--sb-danger); color: white; }
    .btn-block { width: 100%; margin-top: 15px; padding: 14px; }
    
    /* 後台管理架構 */
    #admin-system { display: none; }
    nav { background-color: var(--sb-green-dark); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .menu-toggle { font-size: 14px; font-weight: 600; cursor: pointer; color: var(--sb-accent-gold); border: 1px solid var(--sb-accent-gold); padding: 6px 15px; }
    .brand-name { font-size: 16px; font-weight: 700; letter-spacing: 2px; }
    .btn-nav-logout { background: transparent; border: 1px solid white; color: white; padding: 6px 15px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .btn-nav-logout:hover { background: white; color: var(--sb-green-dark); }
    
    .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background-color: var(--sb-green-dark); padding-top: 10px; transition: 0.3s; z-index: 200; }
    .sidebar.active { left: 0; }
    .sidebar-header { display: flex; justify-content: flex-end; padding: 20px; }
    .close-btn { font-size: 20px; color: white; cursor: pointer; }
    .sidebar-menu { list-style: none; padding: 30px; }
    .sidebar-menu li { padding: 18px 15px; color: #ffffff; font-size: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; font-weight: 500; }
    .sidebar-menu li:hover { color: var(--sb-accent-gold); padding-left: 25px; background-color: rgba(255,255,255,0.02); }
    
    .admin-main-view { padding: 40px 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 35px; }
    .admin-page { display: none; }
    .admin-page.active { display: block; }
    
    .panel { background: var(--sb-gray-card); padding: 35px; border: 1px solid var(--sb-border); margin-bottom: 30px; }
    .panel-title { font-size: 18px; font-weight: 700; color: var(--sb-green-dark); margin-bottom: 25px; border-left: 4px solid var(--sb-accent-gold); padding-left: 12px; text-transform: uppercase; }
    
    /* 條目列表樣式 */
    .data-list { list-style: none; max-height: 550px; overflow-y: auto; border: 1px solid var(--sb-border); padding: 0; background: #ffffff; }
    .data-item { border-bottom: 1px solid var(--sb-border); padding: 20px; font-size: 14px; transition: background-color 0.2s; }
    .data-item:hover { background-color: #faf9f7; }
    .data-row-main { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .data-info-text { font-weight: 500; }
    .data-sub-text { color: var(--sb-text-muted); margin-left: 12px; font-size: 12px; }
    .data-actions { display: flex; gap: 10px; }
    
    /* 修改內嵌區域 */
    .edit-zone { display: none; background: #fdfdfc; border: 1px dashed var(--sb-accent-gold); padding: 25px; margin-top: 20px; }
    .edit-zone.active { display: block; }
    .edit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
    
    /* 自訂通知視窗 */
    .custom-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 3000; display: none; }
    .modal-content { background: white; padding: 35px; text-align: center; max-width: 440px; width: 90%; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border-top: 4px solid var(--sb-green-dark); }
  </style>
</head>
<body>

  <div id="admin-auth-overlay">
    <div class="admin-container">
      <div class="admin-title-main">AROMA BAKERY</div>
      <div class="admin-subtitle-main">CENTRAL MANAGEMENT SYSTEM</div>
      <form id="admin-login-form">
        <div class="form-group">
          <label>管理員帳戶唯一名稱</label>
          <input type="text" id="admin-username" required placeholder="請輸入管理帳號">
        </div>
        <div class="form-group">
          <label>安全性密碼</label>
          <input type="password" id="admin-password" required placeholder="請輸入密碼">
        </div>
        <button type="submit" class="btn-admin-login btn btn-primary btn-block">驗證並登入系統</button>
      </form>
    </div>
  </div>

  <div id="admin-system">
    <nav>
      <div class="menu-toggle" onclick="toggleSidebar()">主選單</div>
      <div class="brand-name">AROMA BAKERY CENTRAL SYSTEM</div>
      <button class="btn-nav-logout" onclick="handleAdminLogout()">登出控制台</button>
    </nav>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header"><div class="close-btn" onclick="toggleSidebar()">×</div></div>
      <ul class="sidebar-menu">
        <li onclick="switchAdminPage('page-products')">商品架設與維護管理</li>
        <li onclick="switchAdminPage('page-members')">全系統會員檔案庫</li>
      </ul>
    </div>

    <div class="admin-main-view">
      <div id="page-products" class="admin-page active">
        <div class="panel">
          <div class="panel-title">建立全新精選商品項目</div>
          <form id="product-form">
            <div class="form-group">
              <label>商品名稱</label>
              <input type="text" id="p-name" required placeholder="請輸入商品正式名稱">
            </div>
            <div class="form-group">
              <label>正式定價 (HKD)</label>
              <input type="number" id="p-price" required placeholder="請輸入定價整數金額">
            </div>
            <div class="form-group">
              <label>商品群組分類</label>
              <select id="p-category">
                <option value="飲品">精選飲品類 / Drinks</option>
                <option value="甜點">精緻甜點類 / Desserts</option>
              </select>
            </div>
            
            <div class="form-group">
              <label>前台客製化規格選項配置（僅對飲品生效）</label>
              <div style="display: flex; gap: 30px; padding: 5px 0;">
                <label style="display: inline-flex; align-items: center; cursor: pointer; font-weight: 500;">
                  <input type="checkbox" id="p-has-ice" style="width: auto; margin-right: 8px;" checked> 
                  啟用冰量調節（正常冰/多冰/少冰）
                </label>
                <label style="display: inline-flex; align-items: center; cursor: pointer; font-weight: 500;">
                  <input type="checkbox" id="p-has-sugar" style="width: auto; margin-right: 8px;" checked> 
                  啟用甜度調節（正常糖/少糖/無糖）
                </label>
              </div>
            </div>

            <div class="form-group">
              <label>商品映像網址 (URL)</label>
              <input type="url" id="p-photo" placeholder="請輸入圖片連結位址">
            </div>
            <div class="form-group">
              <label>商品詳細描述與配方說明</label>
              <textarea id="p-detail" rows="3" placeholder="請輸入商品背景或配方簡介..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-block">確認商品發布上架</button>
          </form>
        </div>

        <div class="panel">
          <div class="panel-title">商品實時數據維護維修庫</div>
          <ul class="data-list" id="admin-products-list"></ul>
        </div>
      </div>

      <div id="page-members" class="admin-page">
        <div class="panel">
          <div class="panel-title">系統註冊會員核心檢索庫</div>
          <div class="form-group">
            <input type="text" id="member-search-input" placeholder="輸入會員姓名或電話號碼進行實時篩選過濾...">
          </div>
          <ul class="data-list" id="admin-members-list"></ul>
        </div>
      </div>
    </div>
  </div>

  <div class="custom-modal" id="alert-modal">
    <div class="modal-content">
      <div id="alert-text" style="padding: 20px 0; font-size: 15px; font-weight: 500;"></div>
      <button class="btn btn-primary" onclick="closeAlert()" style="padding: 10px 40px;">確認</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AlzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
      authDomain: "aroma-bakery-492fa.firebaseapp.com",
      databaseURL: "https://aroma-bakery-492fa-default-rtdb.firebaseio.com",
      projectId: "aroma-bakery-492fa",
      storageBucket: "aroma-bakery-492fa.firebasestorage.app",
      messagingSenderId: "1060567946315",
      appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    let allMembersData = {};

    // 登入驗證
    onAuthStateChanged(auth, (user) => {
      if(user && user.email === 'admin01@aroma.com') {
        document.getElementById('admin-auth-overlay').style.display = 'none';
        document.getElementById('admin-system').style.display = 'block';
        loadProductsAdmin();
        loadMembersAdmin();
      } else {
        document.getElementById('admin-system').style.display = 'none';
        document.getElementById('admin-auth-overlay').style.display = 'flex';
      }
    });

    document.getElementById('admin-login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('admin-username').value.trim();
      const pass = document.getElementById('admin-password').value;
      if(user !== 'admin01@aroma.com') { alert('拒絕存取：非合規管理權限帳號。'); return; }
      signInWithEmailAndPassword(auth, user, pass).catch(err => { alert('驗證失敗：密碼錯誤。'); });
    });

    window.handleAdminLogout = function() {
      if(confirm("確定要終止工作階段並關閉安全主控台？")) {
        signOut(auth).then(() => {
          document.getElementById('admin-username').value = '';
          document.getElementById('admin-password').value = '';
        });
      }
    };

    // 商品上架：納入冰量與甜度布林變數控制
    document.getElementById('product-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const id = 'PROD_' + Date.now();
      const name = document.getElementById('p-name').value.trim();
      const price = parseInt(document.getElementById('p-price').value);
      const category = document.getElementById('p-category').value;
      const photoUrl = document.getElementById('p-photo').value.trim();
      const detail = document.getElementById('p-detail').value.trim();
      
      // 獲取調節狀態
      const hasIce = document.getElementById('p-has-ice').checked;
      const hasSugar = document.getElementById('p-has-sugar').checked;

      set(ref(database, 'products/' + id), {
        name, price, category, photoUrl, detail, hasIce, hasSugar
      }).then(() => {
        alert('商品發布上架成功！前台控制選項同步生效。');
        document.getElementById('product-form').reset();
      });
    });

    // 載入商品庫與內嵌調節配置
    function loadProductsAdmin() {
      onValue(ref(database, 'products'), (snapshot) => {
        const list = document.getElementById('admin-products-list');
        if(!list) return;
        list.innerHTML = '';
        const data = snapshot.val() || {};
        for(let id in data) {
          const p = data[id];
          const iceChecked = p.hasIce !== false ? 'checked' : '';
          const sugarChecked = p.hasSugar !== false ? 'checked' : '';
          
          list.insertAdjacentHTML('beforeend', `
            <li class="data-item" id="item-prod-${id}">
              <div class="data-row-main">
                <div class="data-info-text">[${p.category}] ${p.name} <span class="data-sub-text">HKD ${p.price}</span></div>
                <div class="data-actions">
                  <button class="btn btn-warning" onclick="toggleProductEditZone('${id}')">修改規格</button>
                  <button class="btn btn-danger" onclick="deleteProduct('${id}')">下架</button>
                </div>
              </div>
              <div class="edit-zone" id="edit-zone-${id}">
                <div class="edit-grid">
                  <div><label>變更商品名稱</label><input type="text" id="edit-p-name-${id}" value="${p.name}"></div>
                  <div><label>變更價格</label><input type="number" id="edit-p-price-${id}" value="${p.price}"></div>
                  <div>
                    <label>客製規格調節</label>
                    <div style="padding-top:10px; display:flex; gap:15px; font-size:13px;">
                      <label><input type="checkbox" id="edit-p-has-ice-${id}" ${iceChecked}> 啟用冰量</label>
                      <label><input type="checkbox" id="edit-p-has-sugar-${id}" ${sugarChecked}> 啟用甜度</label>
                    </div>
                  </div>
                </div>
                <button class="btn btn-primary" onclick="saveProductUpdate('${id}')">儲存變更</button>
              </div>
            </li>`);
        }
      });
    }

    window.toggleProductEditZone = function(id) {
      document.getElementById(`edit-zone-${id}`).classList.toggle('active');
    };

    window.saveProductUpdate = function(id) {
      const name = document.getElementById(`edit-p-name-${id}`).value.trim();
      const price = parseInt(document.getElementById(`edit-p-price-${id}`).value);
      const hasIce = document.getElementById(`edit-p-has-ice-${id}`).checked;
      const hasSugar = document.getElementById(`edit-p-has-sugar-${id}`).checked;

      update(ref(database, 'products/' + id), { name, price, hasIce, hasSugar }).then(() => {
        alert('規格欄位更新成功！');
      });
    };

    window.deleteProduct = function(id) {
      if(confirm("確定要下架此商品項目？")) { remove(ref(database, 'products/' + id)); }
    };

    // 載入會員核心數據
    function loadMembersAdmin() {
      onValue(ref(database, 'users'), (snapshot) => {
        allMembersData = snapshot.val() || {};
        renderMembersList(allMembersData);
      });
    }

    function renderMembersList(members) {
      const container = document.getElementById('admin-members-list');
      if(!container) return;
      container.innerHTML = '';
      for(let uid in members) {
        const m = members[uid];
        container.insertAdjacentHTML('beforeend', `
          <li class="data-item">
            <div class="data-info-text" style="font-size:15px; color:var(--sb-green-dark); font-weight:600;">
              ${m.lastName || ''}${m.firstName || '未填名'}
              <span class="data-sub-text" style="font-size:13px;">電話: +852 ${m.phone || '無'} | 生日: ${m.birthday || '無'} | 電郵: ${m.email || '無'}</span>
            </div>
            <div style="font-size:11px; color:var(--sb-accent-gold); margin-top:5px; letter-spacing:0.5px;">系統識別Uid: ${uid}</div>
          </li>`);
      }
    }

    // 實時關鍵字篩選
    document.getElementById('member-search-input').addEventListener('input', (e) => {
      const k = e.target.value.trim().toLowerCase();
      if(!k) { renderMembersList(allMembersData); return; }
      const filtered = {};
      for(let uid in allMembersData) {
        const m = allMembersData[uid];
        const name = ((m.lastName || '') + (m.firstName || '')).toLowerCase();
        const phone = (m.phone || '').toLowerCase();
        if(name.includes(k) || phone.includes(k)) { filtered[uid] = m; }
      }
      renderMembersList(filtered);
    });
  </script>

  <script>
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function switchAdminPage(pageId) {
      document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      document.getElementById('sidebar').classList.remove('active');
    }
  </script>
</body>
</html>

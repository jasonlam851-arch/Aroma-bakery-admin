<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma Bakery - 管理員中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <header class="bg-slate-800 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">🛠 Aroma Bakery 後台管理系統</h1>
            <span class="text-xs bg-emerald-600 px-3 py-1 rounded">即時數據連線中</span>
        </div>
    </header>

    <div class="container mx-auto p-4 grid grid-cols-1 xl:grid-cols-3 gap-6">
        
        <div class="xl:col-span-2 space-y-4">
            <h2 class="text-lg font-bold text-slate-700 flex items-center justify-between">
                <span>📋 今日即時訂單</span>
            </h2>
            <div id="orders-container" class="space-y-4">
                <p class="text-gray-500">正在等待新訂單...</p>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-5 rounded-xl shadow">
                <h2 class="text-md font-bold text-slate-800 mb-3 border-b pb-2">➕ 上架新麵包品項</h2>
                <form id="add-product-form" class="space-y-3 text-sm">
                    <div>
                        <label class="block text-gray-600 mb-1">麵包名稱</label>
                        <input type="text" id="p-name" required class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-gray-600 mb-1">單價 (元)</label>
                        <input type="number" id="p-price" required class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-gray-600 mb-1">今日準備庫存量</label>
                        <input type="number" id="p-stock" required class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-gray-600 mb-1">商品圖片網址 (選填)</label>
                        <input type="text" id="p-image" placeholder="https://..." class="w-full p-2 border rounded">
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded font-bold transition">
                        確認上架商品
                    </button>
                </form>
            </div>

            <div class="bg-white p-5 rounded-xl shadow">
                <h2 class="text-md font-bold text-slate-800 mb-3 border-b pb-2">📦 目前架上庫存狀態</h2>
                <div id="admin-product-list" class="space-y-2 max-h-80 overflow-y-auto">
                    </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
            authDomain: "aroma-bakery-492fa.firebaseapp.com",
            projectId: "aroma-bakery-492fa",
            storageBucket: "aroma-bakery-492fa.firebasestorage.app",
            messagingSenderId: "1060567946315",
            appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. 即時監聽訂單 (依建立時間由新到舊排序)
        const ordersQuery = query(collection(db, "orders"), orderBy("createdAt", "desc"));
        onSnapshot(ordersQuery, (snapshot) => {
            const container = document.getElementById("orders-container");
            container.innerHTML = "";

            if(snapshot.empty) {
                container.innerHTML = `<p class="text-gray-400 bg-white p-6 rounded-lg text-center shadow-sm">目前尚無任何訂單。</p>`;
                return;
            }

            snapshot.forEach((docSnap) => {
                const order = docSnap.data();
                const id = docSnap.id;
                
                // 根據狀態給予不同的外觀標籤
                let statusColor = "bg-amber-100 text-amber-800";
                if(order.status === "製作中") statusColor = "bg-blue-100 text-blue-800";
                if(order.status === "待取貨") statusColor = "bg-purple-100 text-purple-800";
                if(order.status === "已完成") statusColor = "bg-green-100 text-green-800";

                const itemsText = order.items.map(item => `${item.name} x ${item.qty}`).join('、');

                const card = document.createElement("div");
                card.className = "bg-white p-5 rounded-xl shadow-sm border border-gray-200";
                card.innerHTML = `
                    <div class="flex justify-between items-start border-b pb-2 mb-3">
                        <div>
                            <span class="text-sm font-bold text-gray-700">訂購人：${order.customerName} (${order.customerPhone})</span>
                            <p class="text-xs text-gray-400 mt-1">預計取貨時間：<strong class="text-amber-700">${order.pickupTime}</strong></p>
                        </div>
                        <span class="px-2.5 py-1 rounded-full text-xs font-bold ${statusColor}">${order.status}</span>
                    </div>
                    <div class="text-gray-600 text-sm mb-4">
                        <strong class="text-gray-800">細項：</strong> ${itemsText}
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-md font-bold text-slate-800">總金額: $${order.totalPrice}</span>
                        <div class="flex gap-2">
                            <button onclick="changeStatus('${id}', '製作中')" class="bg-blue-50 text-blue-700 text-xs px-2 py-1 rounded border hover:bg-blue-500 hover:text-white">接單製作</button>
                            <button onclick="changeStatus('${id}', '待取貨')" class="bg-purple-50 text-purple-700 text-xs px-2 py-1 rounded border hover:bg-purple-500 hover:text-white">已好等取</button>
                            <button onclick="changeStatus('${id}', '已完成')" class="bg-green-50 text-green-700 text-xs px-2 py-1 rounded border hover:bg-green-500 hover:text-white">完成取貨</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        });

        // 2. 修改訂單狀態功能
        window.changeStatus = async (id, newStatus) => {
            const orderRef = doc(db, "orders", id);
            await updateDoc(orderRef, { status: newStatus });
        };

        // 3. 商品管理：即時載入後台商品狀態
        onSnapshot(collection(db, "products"), (snapshot) => {
            const list = document.getElementById("admin-product-list");
            list.innerHTML = "";
            snapshot.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const div = document.createElement("div");
                div.className = "flex justify-between items-center bg-gray-50 p-2 rounded text-xs text-gray-700";
                div.innerHTML = `
                    <span><strong>${p.name}</strong> ($${p.price}) - 剩餘庫存: ${p.stock}</span>
                    <div class="flex gap-1">
                        <button onclick="changeStock('${id}', ${p.stock + 5})" class="px-1.5 bg-gray-200 rounded hover:bg-gray-300">+5</button>
                        <button onclick="deleteProduct('${id}')" class="text-red-500 hover:underline px-1">下架</button>
                    </div>
                `;
                list.appendChild(div);
            });
        });

        // 4. 新增商品邏輯
        document.getElementById("add-product-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const productData = {
                name: document.getElementById("p-name").value,
                price: Number(document.getElementById("p-price").value),
                stock: Number(document.getElementById("p-stock").value),
                image: document.getElementById("p-image").value || ""
            };
            await addDoc(collection(db, "products"), productData);
            alert("商品上架成功！");
            document.getElementById("add-product-form").reset();
        });

        // 5. 修改庫存與刪除商品
        window.changeStock = async (id, newStock) => {
            await updateDoc(doc(db, "products", id), { stock: newStock });
        };
        window.deleteProduct = async (id) => {
            if(confirm("確定要下架這款麵包嗎？")) {
                await deleteDoc(doc(db, "products", id));
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma_bakery | 核心管理後台控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sb-green-dark: #1e3932;
            --sb-green-light: #d4e9e2;
            --sb-accent-gold: #cba258;
            --sb-text-black: #212529;
            --sb-gray-bg: #f4f2ed;
            --sb-gray-card: #f9f9f9;
            --sb-border: #dbd9d3;
            --sb-danger: #b02a37;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', 'Noto Serif TC', serif; background-color: var(--sb-gray-bg); color: var(--sb-text-black); min-height: 100vh; letter-spacing: 0.5px; }
        
        /* 管理員登入封面 */
        #admin-auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(30, 57, 50, 0.85), rgba(30, 57, 50, 0.85)), url('https://images.unsplash.com/photo-1544787219-7f47ccb76574?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed; background-size: cover; z-index: 1000; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease; }
        .admin-container { background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 90%; max-width: 450px; }
        .brand-header { text-align: center; margin-bottom: 25px; }
        .brand-title { font-family: 'Noto Serif TC', serif; font-size: 24px; font-weight: 700; color: var(--sb-green-dark); letter-spacing: 1px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: var(--sb-green-dark); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px 15px; border: 1px solid var(--sb-border); border-radius: 4px; font-size: 14px; background-color: #ffffff; transition: border-color 0.2s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--sb-green-light); }
        .btn-admin-login { width: 100%; padding: 16px; background-color: var(--sb-green-dark); color: #ffffff; border: none; border-radius: 50px; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: background-color 0.2s; }
        .btn-admin-login:hover { background-color: #132521; }
        .error-message { color: var(--sb-danger); font-size: 12px; text-align: center; margin-top: 20px; display: none; font-weight: 500; }
        
        /* 內部管理主系統 */
        #admin-system { display: none; }
        nav { background-color: var(--sb-green-dark); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; color: white; position: sticky; top: 0; z-index: 100; }
        .brand-name { font-weight: 700; font-size: 16px; letter-spacing: 1px; }
        .btn-nav-logout { background: transparent; border: 1px solid white; color: white; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.2s; }
        .btn-nav-logout:hover { background: white; color: var(--sb-green-dark); }
        
        .menu-toggle { font-size: 14px; cursor: pointer; border: 1px solid var(--sb-green-light); padding: 6px 12px; border-radius: 4px; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background-color: var(--sb-green-dark); padding-top: 10px; transition: 0.3s; z-index: 200; box-shadow: 5px 0 15px rgba(0,0,0,0.3); }
        .sidebar.active { left: 0; }
        .sidebar-header { display: flex; justify-content: flex-end; padding: 15px 20px; }
        .close-btn { font-size: 20px; color: white; cursor: pointer; }
        .sidebar-menu { list-style: none; padding: 30px; }
        .sidebar-menu li { padding: 18px 15px; color: #ffffff; font-size: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; font-weight: 500; }
        .sidebar-menu li:hover { color: var(--sb-accent-gold); padding-left: 25px; background-color: rgba(255,255,255,0.02); }
        
        /* 主體內容 */
        .main-content { padding: 40px 30px; max-width: 1280px; margin: 0 auto; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        h2 { font-family: 'Montserrat', 'Noto Serif TC', serif; font-size: 24px; font-weight: 600; color: var(--sb-green-dark); margin-bottom: 35px; letter-spacing: 1px; }
        .panel { background: #ffffff; padding: 35px; border-radius: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 30px; border: 1px solid var(--sb-border); }
        .panel-title { font-size: 16px; font-weight: 600; color: var(--sb-green-dark); margin-bottom: 20px; border-bottom: 1px solid var(--sb-border); padding-bottom: 10px; }
        
        .btn { display: inline-block; padding: 12px 24px; font-size: 14px; font-weight: 600; border-radius: 4px; cursor: pointer; border: none; text-align: center; }
        .btn-primary { background-color: var(--sb-green-dark); color: white; }
        .btn-primary:hover { background-color: #132521; }
        .btn-block { width: 100%; margin-top: 15px; padding: 14px; }
        
        /* 商品項目維護條目 */
        .data-list { list-style: none; max-height: 550px; overflow-y: auto; border: 1px solid var(--sb-border); border-radius: 0; padding: 0; background: #ffffff; }
        .data-item { border-bottom: 1px solid var(--sb-border); padding: 20px; font-size: 14px; transition: background-color 0.2s; }
        .data-item:hover { background-color: var(--sb-gray-card); }
        .data-item:last-child { border-bottom: none; }
        .data-row-main { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .data-info-text { font-weight: 500; font-size: 15px; color: var(--sb-green-dark); }
        .data-sub-text { color: #6c757d; margin-left: 12px; font-size: 13px; font-weight: 400; }
        .data-actions { display: flex; gap: 10px; }
        .btn-danger-text { color: var(--sb-danger); cursor: pointer; background: none; border: none; text-decoration: underline; font-weight: 600; }
        
        /* 彈窗元件 */
        .custom-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .custom-modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: white; padding: 30px; border-radius: 4px; max-width: 450px; width: 90%; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="admin-auth-overlay">
        <div class="admin-container">
            <div class="brand-header"><div class="brand-title">AROMA BAKERY 後台授權中心</div></div>
            <form id="admin-login-form" onsubmit="window.handleAdminLogin(event); return false;">
                <div class="form-group">
                    <label>管理員最高權限信箱</label>
                    <input type="email" id="admin-email" required placeholder="請輸入授權管理員帳號">
                </div>
                <div class="form-group">
                    <label>安全性密碼</label>
                    <input type="password" id="admin-password" required placeholder="請輸入安全性授權密碼">
                </div>
                <button type="submit" class="btn-admin-login">驗證並登入系統</button>
                <div id="error-msg" class="error-message">安全驗證失敗：帳號或密碼錯誤，拒絕存取權限。</div>
            </form>
        </div>
    </div>

    <div id="admin-system">
        <nav>
            <div class="menu-toggle" onclick="toggleSidebar()">主選單</div>
            <div class="brand-name">AROMA BAKERY CENTRAL SYSTEM</div>
            <button class="btn-nav-logout" onclick="window.handleAdminLogout()">登出控制台</button>
        </nav>
        
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header"><div class="close-btn" onclick="toggleSidebar()">關閉</div></div>
            <ul class="sidebar-menu">
                <li onclick="switchAdminPage('page-products')">商品架設與維護管理</li>
            </ul>
        </div>
        
        <div class="main-content">
            <div id="page-products" class="page-section active">
                <h2>商品架設與維護管理</h2>
                <div class="panel">
                    <div class="panel-title">上架全新商品</div>
                    <form id="product-form" onsubmit="window.handleProductSubmit(event); return false;">
                        <div class="form-group">
                            <label>商品完整名稱</label>
                            <input type="text" id="p-name" required placeholder="例：焦糖瑪奇朵 Latte">
                        </div>
                        <div class="form-group">
                            <label>販售定價 (HKD)</label>
                            <input type="number" id="p-price" required placeholder="例：42">
                        </div>
                        <div class="form-group">
                            <label>歸屬核心分類</label>
                            <select id="p-category" required>
                                <option value="飲品">精選飲品類 / Drinks</option>
                                <option value="甜點">精緻甜點類 / Desserts</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>商品映像網址 (URL)</label>
                            <input type="url" id="p-photo" placeholder="請輸入圖片連結位址">
                        </div>
                        <div class="form-group">
                            <label>商品詳細描述與配方說明</label>
                            <textarea id="p-detail" rows="4" placeholder="請輸入商品背景、風味或配方簡介..."></textarea>
                        </div>
                        
                        <div class="form-group" style="margin-top: 15px; margin-bottom: 20px;">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px;">
                                <input type="checkbox" id="p-allow-customize" style="width: 18px; height: 18px; accent-color: var(--sb-green-dark);">
                                <span style="font-weight: 600; color: var(--sb-green-dark); text-transform: none;">啟用冰量/甜度客製化選項（勾選後顧客端可調整多冰/少冰/甜度）</span>
                            </label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-block">確認商品發布上架</button>
                    </form>
                </div>
                
                <div class="panel">
                    <div class="panel-title">商品實時數據檢索</div>
                    <ul class="data-list" id="admin-products-list">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="custom-modal" id="alert-modal">
        <div class="modal-content">
            <div id="alert-text" style="padding: 25px 0; font-size: 15px; font-weight: 500; line-height: 1.6;"></div>
            <button class="btn btn-primary" onclick="window.closeAlert()" style="padding: 10px 35px;">確認</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AlzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
            authDomain: "aroma-bakery-492fa.firebaseapp.com",
            databaseURL: "https://aroma-bakery-492fa-default-rtdb.firebaseio.com",
            projectId: "aroma-bakery-492fa",
            storageBucket: "aroma-bakery-492fa.firebasestorage.app",
            messagingSenderId: "1060567946315",
            appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // 監聽管理授權認證
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (user.email !== 'admin01@aroma.com') {
                    window.showCustomAlert('安全性警示：您目前的帳號不具備管理員權限，系統已自動拒絕連線。');
                    signOut(auth);
                    return;
                }
                document.getElementById('admin-auth-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('admin-auth-overlay').style.display = 'none';
                    document.getElementById('admin-system').style.display = 'block';
                }, 400);

                // 實時讀取並渲染商品列表，供刪除與檢視
                onValue(ref(database, 'products'), (snapshot) => {
                    const products = snapshot.val() || {};
                    const container = document.getElementById('admin-products-list');
                    if (!container) return;
                    container.innerHTML = "";
                    
                    for (let id in products) {
                        const p = products[id];
                        const custStatusLabel = p.allowCustomize ? "✅ 已啟用冰/甜客製化" : "❌ 固定配置";
                        const li = document.createElement('li');
                        li.className = "data-item";
                        li.innerHTML = `
                            <div class="data-row-main">
                                <div>
                                    <span class="data-info-text">${p.name}</span>
                                    <span class="data-sub-text">價格: HK$${p.price} | 分類: ${p.category} | 權限狀態: ${custStatusLabel}</span>
                                </div>
                                <div class="data-actions">
                                    <button class="btn-danger-text" onclick="window.deleteProduct('${id}')">下架商品</button>
                                </div>
                            </div>
                        `;
                        container.appendChild(li);
                    }
                });
            } else {
                document.getElementById('admin-system').style.display = 'none';
                document.getElementById('admin-auth-overlay').style.display = 'flex';
                setTimeout(() => { document.getElementById('admin-auth-overlay').style.opacity = '1'; }, 50);
            }
        });

        // 處理添加新商品提交與寫入資料庫
        window.handleProductSubmit = function(e) {
            if (e && e.preventDefault) e.preventDefault();
            const name = document.getElementById('p-name').value.trim();
            const price = Number(document.getElementById('p-price').value);
            const category = document.getElementById('p-category').value;
            const photoUrl = document.getElementById('p-photo').value.trim();
            const detail = document.getElementById('p-detail').value.trim();
            const allowCustomize = document.getElementById('p-allow-customize').checked; // 擷取客製化開關狀態

            const newProductRef = push(ref(database, 'products'));
            set(newProductRef, {
                name: name,
                price: price,
                category: category,
                photoUrl: photoUrl,
                detail: detail,
                allowCustomize: allowCustomize, // 封裝 true/false 狀態送往雲端數據庫
                timestamp: Date.now()
            }).then(() => {
                window.showCustomAlert('🎉 商品發布成功，已實時同步更新至顧客中心。');
                document.getElementById('product-form').reset();
            }).catch((err) => {
                window.showCustomAlert('發布失敗：' + err.message);
            });
        };

        // 下架產品功能
        window.deleteProduct = function(id) {
            if (confirm("確定要下架並刪除此項商品嗎？此操作無法撤銷。")) {
                remove(ref(database, 'products/' + id))
                    .then(() => { window.showCustomAlert('商品下架成功。'); })
                    .catch((err) => { window.showCustomAlert('刪除失敗：' + err.message); });
            }
        };

        // 管理員登入登出
        window.handleAdminLogin = function(e) {
            if (e && e.preventDefault) e.preventDefault();
            const email = document.getElementById('admin-email').value.trim();
            const pass = document.getElementById('admin-password').value;
            signInWithEmailAndPassword(auth, email, pass).catch((err) => {
                const errDiv = document.getElementById('error-msg');
                errDiv.style.display = 'block';
                setTimeout(() => { errDiv.style.display = 'none'; }, 3000);
            });
        };

        window.handleAdminLogout = function() {
            if (confirm("確定要安全登出核心行政控制台嗎？")) {
                signOut(auth).then(() => {
                    document.getElementById('admin-email').value = "";
                    document.getElementById('admin-password').value = "";
                });
            }
        };

        // 系統提示框彈窗控制器
        window.showCustomAlert = function(msg) {
            document.getElementById('alert-text').innerText = msg;
            document.getElementById('alert-modal').classList.add('active');
        };
        window.closeAlert = function() {
            document.getElementById('alert-modal').classList.remove('active');
        };
    </script>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function switchAdminPage(pageId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('sidebar').classList.remove('active');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma Bakery | Concierge Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        .font-admin { font-family: 'Cinzel', 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-[#121212] text-[#E0E0E0] font-admin min-h-screen antialiased">

    <header class="bg-[#1C1C1C] border-b border-[#2C2C2C] px-8 py-5 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-[0.2em] text-[#E5D5C5]">AROMA BAKERY CONTROL</h1>
                <p class="text-[10px] text-emerald-500 tracking-wider mt-0.5">● LIVE DATA OVER ARCHITECTURE</p>
            </div>
        </div>
    </header>

    <div class="container mx-auto p-6 grid grid-cols-1 xl:grid-cols-3 gap-8">
        
        <div class="xl:col-span-2 space-y-6">
            <h2 class="text-sm font-semibold tracking-[0.15em] text-[#A89280] uppercase border-b border-[#2C2C2C] pb-2">📋 Live Orders / 即時預訂序列</h2>
            <div id="orders-container" class="space-y-4">
                <p class="text-gray-500 italic text-sm">Awaiting new transmissions...</p>
            </div>
        </div>

        <div class="space-y-8">
            <div class="bg-[#1C1C1C] p-6 border border-[#2C2C2C] rounded-none shadow-lg">
                <h2 class="text-xs font-semibold text-[#E5D5C5] tracking-[0.2em] mb-4 pb-2 border-b border-[#333]">➕ INVENTORY INGESTION / 上架珍品</h2>
                <form id="add-product-form" class="space-y-4 text-xs">
                    <div>
                        <label class="block text-[#A89280] mb-1 tracking-wider">麵包品名 NAME</label>
                        <input type="text" id="p-name" required class="w-full p-3 bg-[#262626] border border-[#3A3A3A] focus:outline-none focus:border-[#E5D5C5] text-white">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[#A89280] mb-1 tracking-wider">單價 PRICE (NT$)</label>
                            <input type="number" id="p-price" required class="w-full p-3 bg-[#262626] border border-[#3A3A3A] focus:outline-none focus:border-[#E5D5C5] text-white">
                        </div>
                        <div>
                            <label class="block text-[#A89280] mb-1 tracking-wider">配額 STOCK</label>
                            <input type="number" id="p-stock" required class="w-full p-3 bg-[#262626] border border-[#3A3A3A] focus:outline-none focus:border-[#E5D5C5] text-white">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[#A89280] mb-1 tracking-wider">頂級意象圖片網址 IMAGE URL</label>
                        <input type="text" id="p-image" placeholder="https://..." class="w-full p-3 bg-[#262626] border border-[#3A3A3A] focus:outline-none focus:border-[#E5D5C5] text-white">
                    </div>
                    <button type="submit" class="w-full bg-[#E5D5C5] hover:bg-[#CFC0B0] text-black tracking-[0.2em] font-semibold py-3 transition text-xs uppercase">
                        確認上架發佈
                    </button>
                </form>
            </div>

            <div class="bg-[#1C1C1C] p-6 border border-[#2C2C2C] rounded-none shadow-lg">
                <h2 class="text-xs font-semibold text-[#E5D5C5] tracking-[0.2em] mb-4 pb-2 border-b border-[#333]">📦 CURRENT VAULT / 首席庫存庫</h2>
                <div id="admin-product-list" class="space-y-3 max-h-80 overflow-y-auto">
                    </div>
            </div>
        </div>
    </div>

    <div id="login-overlay" class="fixed inset-0 bg-black/95 flex items-center justify-center z-50">
        <div class="bg-[#1C1C1C] p-8 border border-[#2C2C2C] max-w-sm w-full text-center">
            <h3 class="text-md font-bold tracking-widest text-[#E5D5C5] mb-6">AROMA BAKERY CONCIERGE</h3>
            <div class="space-y-4">
                <input type="email" id="admin-email" placeholder="經理信箱" class="w-full p-3 bg-[#262626] border border-[#3A3A3A] text-xs text-white">
                <input type="password" id="admin-password" placeholder="認證安全密鑰" class="w-full p-3 bg-[#262626] border border-[#3A3A3A] text-xs text-white">
                <button onclick="loginAdmin()" class="w-full bg-[#E5D5C5] text-black text-xs p-3 font-bold tracking-widest hover:bg-[#CFC0B0] transition uppercase">驗證登入</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
            authDomain: "aroma-bakery-492fa.firebaseapp.com",
            databaseURL: "https://aroma-bakery-492fa-default-rtdb.firebaseio.com",
            projectId: "aroma-bakery-492fa",
            storageBucket: "aroma-bakery-492fa.firebasestorage.app",
            messagingSenderId: "1060567946315",
            appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        window.loginAdmin = () => {
            const email = document.getElementById("admin-email").value;
            const password = document.getElementById("admin-password").value;
            signInWithEmailAndPassword(auth, email, password).catch(err => alert("憑證無效，拒絕存取。"));
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("login-overlay").classList.add("hidden");
                initializeDashboard();
            } else {
                document.getElementById("login-overlay").classList.remove("hidden");
            }
        });

        function initializeDashboard() {
            // 監聽訂單
            onValue(ref(db, "orders"), (snapshot) => {
                const container = document.getElementById("orders-container");
                container.innerHTML = "";
                const orders = snapshot.val() || {};

                if(Object.keys(orders).length === 0) {
                    container.innerHTML = `<p class="text-gray-500 italic text-xs bg-[#1C1C1C] p-6 text-center border border-[#2C2C2C]">無待處理預訂序列。</p>`;
                    return;
                }

                // 按時間新舊排序（RTDB 是物件，轉陣列處理）
                const sortedOrders = Object.keys(orders).map(key => ({id: key, ...orders[key]})).sort((a,b) => b.createdAt - a.createdAt);

                sortedOrders.forEach(order => {
                    let statusStyle = "border-[#A89280] text-[#A89280]";
                    if(order.status === "製作中") statusStyle = "border-blue-500 text-blue-400";
                    if(order.status === "待取貨") statusStyle = "border-purple-500 text-purple-400";
                    if(order.status === "已完成") statusStyle = "border-emerald-500 text-emerald-400 opacity-40";

                    const itemsText = order.items.map(item => `${item.name} (x${item.qty})`).join(', ');

                    const card = document.createElement("div");
                    card.className = "bg-[#1C1C1C] p-5 border border-[#2C2C2C] relative transition duration-300";
                    card.innerHTML = `
                        <div class="flex justify-between items-start border-b border-[#2C2C2C] pb-3 mb-3 text-xs">
                            <div>
                                <span class="font-bold text-gray-200 text-sm">貴賓：${order.customerName} / ${order.customerPhone}</span>
                                <p class="text-[#A89280] mt-1 tracking-wider">預定取貨時段：<strong class="text-[#E5D5C5]">${order.pickupTime}</strong></p>
                            </div>
                            <span class="px-3 py-1 border text-[10px] uppercase tracking-widest ${statusStyle}">${order.status}</span>
                        </div>
                        <div class="text-gray-400 text-xs mb-4 tracking-wide">
                            <span class="text-gray-500">序項明細：</span> ${itemsText}
                        </div>
                        <div class="flex justify-between items-center pt-2">
                            <span class="text-sm font-semibold text-[#E5D5C5]">NT$ ${order.totalPrice}</span>
                            <div class="flex gap-2 text-[10px]">
                                <button onclick="changeStatus('${order.id}', '製作中')" class="border border-blue-900 text-blue-400 px-2 py-1 hover:bg-blue-950 transition">烘焙製作</button>
                                <button onclick="changeStatus('${order.id}', '待取貨')" class="border border-purple-900 text-purple-400 px-2 py-1 hover:bg-purple-950 transition">置櫃候取</button>
                                <button onclick="changeStatus('${order.id}', '已完成')" class="border border-emerald-900 text-emerald-400 px-2 py-1 hover:bg-emerald-950 transition">出閣禮成</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });

            // 監聽後台庫存
            onValue(ref(db, "products"), (snapshot) => {
                const list = document.getElementById("admin-product-list");
                list.innerHTML = "";
                const products = snapshot.val() || {};
                for (let id in products) {
                    const p = products[id];
                    const div = document.createElement("div");
                    div.className = "flex justify-between items-center bg-[#262626] p-3 border border-[#3A3A3A] text-[11px]";
                    div.innerHTML = `
                        <span class="tracking-wide"><strong>${p.name}</strong> (NT$${p.price}) <span class="text-[#A89280]">儲量: ${p.stock}</span></span>
                        <div class="flex gap-2">
                            <button onclick="changeStock('${id}', ${p.stock + 10})" class="px-2 py-0.5 bg-[#333] hover:bg-[#444] rounded text-gray-300">+10</button>
                            <button onclick="deleteProduct('${id}')" class="text-red-400 hover:underline">下架</button>
                        </div>
                    `;
                    list.appendChild(div);
                }
            });
        }

        // 🟢 正確的修復：使用 Realtime Database 的 push & set 語法
        document.getElementById("add-product-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const name = document.getElementById("p-name").value;
            const price = Number(document.getElementById("p-price").value);
            const stock = Number(document.getElementById("p-stock").value);
            const image = document.getElementById("p-image").value || "";

            try {
                const productsRef = ref(db, "products");
                const newProductRef = push(productsRef); // 在 products 下產生隨機唯一 ID 的節點
                
                await set(newProductRef, {
                    name: name,
                    price: price,
                    stock: stock,
                    image: image
                });

                alert("高級烘焙品項上架成功！");
                document.getElementById("add-product-form").reset();
            } catch (error) {
                console.error("上架發生錯誤: ", error);
                alert("上架失敗：" + error.message);
            }
        });

        window.changeStatus = async (id, newStatus) => {
            await update(ref(db, `orders/${id}`), { status: newStatus });
        };

        window.changeStock = async (id, newStock) => {
            await update(ref(db, `products/${id}`), { stock: newStock });
        };

        window.deleteProduct = async (id) => {
            if(confirm("確定要下架這款極致烘焙嗎？")) {
                await remove(ref(db, `products/${id}`));
            }
        };
    </script>
</body>
</html>

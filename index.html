<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma_bakery | 管理員平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1e3932;
            --accent-color: #cba258;
            --text-color: #212529;
            --dark-overlay: rgba(15, 23, 20, 0.75);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', 'Noto Serif TC', serif;
            background: linear-gradient(var(--dark-overlay), var(--dark-overlay)), 
                        url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        .admin-container {
            background: rgba(255, 255, 255, 0.93);
            padding: 50px 40px;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border-top: 4px solid var(--accent-color);
        }

        .admin-header { text-align: center; margin-bottom: 35px; }
        .admin-title { font-family: 'Noto Serif TC', serif; font-size: 24px; font-weight: 700; color: var(--primary-color); letter-spacing: 1px; }
        .admin-subtitle { font-size: 11px; color: #6c757d; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; }

        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: #495057; letter-spacing: 1px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 1px solid #cccccc; border-radius: 4px; font-size: 14px; background-color: #fbfbfb; transition: all 0.3s; }
        input:focus { outline: none; border-color: var(--primary-color); background-color: #ffffff; box-shadow: 0 0 0 3px rgba(30, 57, 50, 0.1); }

        .btn-admin-login { width: 100%; padding: 14px; background-color: var(--primary-color); color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background-color 0.3s; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }
        .btn-admin-login:hover { background-color: #132521; }
        .error-message { color: #b02a37; font-size: 13px; text-align: center; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-title">Aroma_bakery</div>
            <div class="admin-subtitle">Management System</div>
        </div>

        <form id="admin-login-form" onsubmit="handleAdminLogin(event)">
            <div class="form-group">
                <label for="admin-username">管理員管理號碼 (帳號)</label>
                <input type="text" id="admin-username" required placeholder="請輸入管理員帳號">
            </div>

            <div class="form-group">
                <label for="admin-password">安全性密碼</label>
                <input type="password" id="admin-password" required placeholder="請輸入管理員密碼">
            </div>

            <button type="submit" class="btn-admin-login">系統驗證登入</button>
            <div id="error-msg" class="error-message">管理員帳號或密碼不正確</div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
            authDomain: "aroma-bakery-492fa.firebaseapp.com",
            databaseURL: "https://aroma-bakery-492fa-default-rtdb.firebaseio.com",
            projectId: "aroma-bakery-492fa",
            storageBucket: "aroma-bakery-492fa.firebasestorage.app",
            messagingSenderId: "1060567946315",
            appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleAdminLogin = function(event) {
            event.preventDefault();
            const userField = document.getElementById('admin-username').value;
            const passField = document.getElementById('admin-password').value;
            const errorMsg = document.getElementById('error-msg');

            // 嚴格比對指定帳號密碼 admin01
            if (userField === 'admin01' && passField === 'admin01') {
                errorMsg.style.display = 'none';
                
                // 使用 Firebase 認證建立管理員工作階段（對應後台虛擬信箱）
                signInWithEmailAndPassword(auth, "admin01@aroma.com", "admin01SuperPassword")
                    .then((userCredential) => {
                        alert('管理員驗證成功，正在導向管理後台...');
                        // 此處可導向你的後台管理主頁，如：window.location.href = 'dashboard.html';
                    })
                    .catch((error) => {
                        alert("系統架構未完成：請先在 Firebase Authentication 手案新增一組電郵為 admin01@aroma.com，密碼為 admin01SuperPassword 的帳號。");
                    });
            } else {
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma_bakery | 官方後台管理系統</title>
    <style>
        :root {
            --caramel-dark: #4A332D;
            --caramel-main: #8B4513;
            --caramel-light: #D2691E;
            --cream-bg: #FDFBF7;
            --sand-light: #F4EBE1;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--cream-bg);
            color: var(--caramel-dark);
            margin: 0;
            padding: 20px;
        }

        /* 管理員專用自訂內建彈窗 */
        .admin-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center;
            z-index: 11000;
        }
        .admin-modal {
            background: white; border-radius: 6px; padding: 25px; width: 90%; max-width: 360px;
            text-align: center; box-shadow: 0 4px 25px rgba(0,0,0,0.2);
        }
        .admin-modal h3 { margin-top: 0; color: #cc0000; }
        .admin-modal p { font-size: 14px; color: #333; line-height: 1.6; }
        .admin-modal-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .btn-adm-ok { background: var(--caramel-main); color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-adm-cancel { background: #eee; color: #333; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; }
        
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--cream-bg); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; border: 1px solid var(--sand-light); border-radius: 8px; padding: 30px; width: 100%; max-width: 360px; box-shadow: 0 4px 15px rgba(74,51,45,0.08); text-align: center; }
        .login-box h2 { color: var(--caramel-main); margin-bottom: 5px; }
        .login-box p { font-size: 13px; color: var(--caramel-light); margin-bottom: 25px; letter-spacing: 1px; }
        .input-group { position: relative; margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .password-toggle { position: absolute; right: 10px; bottom: 8px; cursor: pointer; user-select: none; font-size: 13px; color: #777; }
        .btn-login { background-color: var(--caramel-main); color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-login:hover { background-color: var(--caramel-dark); }

        .main-content { display: none; }
        .system-header { text-align: center; border-bottom: 2px solid var(--caramel-main); padding-bottom: 10px; margin-bottom: 25px; position: relative; }
        .system-header h1 { margin: 0; color: var(--caramel-main); font-size: 28px; }
        .system-header span { font-size: 14px; color: var(--caramel-light); letter-spacing: 1px; }
        .user-badge { position: absolute; right: 10px; bottom: 10px; font-size: 14px; font-weight: bold; color: var(--caramel-dark); }
        
        .admin-container { max-width: 1350px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .panel { background: white; border: 1px solid var(--sand-light); border-radius: 6px; padding: 20px; box-shadow: 0 2px 5px rgba(74,51,45,0.05); height: fit-content; margin-bottom: 20px; }
        .panel-title { font-size: 18px; font-weight: bold; margin-top: 0; margin-bottom: 20px; color: var(--caramel-dark); border-left: 4px solid var(--caramel-main); padding-left: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .file-input-wrapper { border: 2px dashed #ccc; padding: 15px; text-align: center; background-color: #fafafa; cursor: pointer; border-radius: 4px; }
        .preview-img { max-width: 100%; max-height: 120px; margin-top: 10px; display: none; border-radius: 4px; }
        .btn-submit { background-color: var(--caramel-main); color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 15px; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .product-card { background: white; border: 1px solid #eee; border-radius: 6px; padding: 10px; text-align: center; position: relative; }
        .product-card img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; }
        .prod-name { font-weight: bold; margin: 8px 0 4px; font-size: 13px; }
        .prod-price { color: var(--caramel-light); font-weight: bold; font-size: 13px; }
        .btn-delete { position: absolute; top: 5px; right: 5px; background: rgba(255, 71, 87, 0.9); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 11px; line-height: 22px; padding: 0; }
        
        .crm-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        .crm-table th { background-color: var(--sand-light); padding: 8px; color: var(--caramel-dark); }
        .crm-table td { padding: 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .inline-edit-input { width: 80px; padding: 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; }
        .btn-save-inline { background: var(--caramel-light); color: white; border: none; padding: 3px 6px; border-radius: 3px; cursor: pointer; margin-left: 4px; font-size: 11px; }
        .btn-kick { background-color: #cc0000; color: white; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 管理端專用自訂內建彈窗 UI -->
    <div class="admin-modal-overlay" id="adm-modal-screen">
        <div class="admin-modal">
            <h3 id="adm-modal-title">管理處通知</h3>
            <p id="adm-modal-msg"></p>
            <div class="admin-modal-btns" id="adm-modal-btn-container"></div>
        </div>
    </div>

    <!-- 管理員登入介面 -->
    <div class="login-overlay" id="login-screen">
        <div class="login-box">
            <h2>Aroma_bakery</h2>
            <p>官方管理系統</p>
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="loginUser">管理員帳號</label>
                    <input type="text" id="loginUser" required placeholder="請輸入帳號">
                </div>
                <div class="input-group">
                    <label for="loginPass">管理密碼</label>
                    <input type="password" id="loginPass" required placeholder="請輸入密碼">
                    <span class="password-toggle" id="pass-toggle" onclick="togglePasswordVisibility()">顯示密碼</span>
                </div>
                <button type="submit" class="btn-login">登入系統</button>
            </form>
        </div>
    </div>

    <!-- 主管理後台 -->
    <div class="main-content" id="main-admin-content">
        <div class="system-header">
            <h1>Aroma_bakery 官方管理後台</h1>
            <span>企業會員與雲端菜單管理控制台</span>
            <div class="user-badge">當前登入：<span id="current-user-display">-</span></div>
        </div>

        <div class="admin-container">
            <div>
                <div class="panel">
                    <div class="panel-title">上架新商品 (HKD 定價)</div>
                    <form id="add-product-form" onsubmit="handleFormSubmit(event)">
                        <div class="form-group">
                            <label for="prodName">商品名字：</label>
                            <input type="text" id="prodName" required placeholder="例如：法式可麗露">
                        </div>
                        <div class="form-group">
                            <label for="prodPrice">商品價格 (HKD)：</label>
                            <input type="number" id="prodPrice" min="0" required placeholder="例如：45">
                        </div>
                        <div class="form-group">
                            <label>商品相片：</label>
                            <div class="file-input-wrapper" onclick="document.getElementById('prodImage').click()">
                                <span id="upload-hint">點擊選取相片</span>
                                <input type="file" id="prodImage" accept="image/*" style="display:none;" onchange="previewImage(this)">
                                <img id="img-preview" class="preview-img" alt="預覽圖">
                            </div>
                        </div>
                        <button type="submit" class="btn-submit">確認安全上架</button>
                    </form>
                </div>
                
                <div class="panel">
                    <div class="panel-title">目前上架商品庫存 (<span id="prod-count">0</span>)</div>
                    <div class="product-grid" id="products-list-view"></div>
                </div>
            </div>

            <div>
                <div class="panel">
                    <div class="panel-title">全體註冊使用者資料名冊 (管理員具備註銷與修改權限)</div>
                    <table class="crm-table">
                        <thead>
                            <tr>
                                <th>編號 (Numb)</th>
                                <th>姓名</th>
                                <th>電話號碼</th>
                                <th>註冊日期</th>
                                <th>出生日期 (修改)</th>
                                <th>管理操作</th>
                            </tr>
                        </thead>
                        <tbody id="crm-users-view">
                            <tr><td colspan="6" style="color: #999; text-align: center; padding: 20px;">載入會員資料中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
            authDomain: "aroma-bakery-492fa.firebaseapp.com",
            databaseURL: "https://aroma-bakery-492fa-default-rtdb.firebaseio.com/",
            projectId: "aroma-bakery-492fa",
            storageBucket: "aroma-bakery-492fa.firebasestorage.app",
            messagingSenderId: "1060567946315",
            appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentImageBase64 = "";
        let globalAdminToken = "AromaAdmin2026";
        const allowedUsers = { "Aroma01": "Admin01", "Aroma02": "Admin02" };

        // 封裝管理端專用自訂模態窗
        function showAdminModal(title, msg, onConfirm = null, isConfirmType = false) {
            document.getElementById('adm-modal-title').innerText = title;
            document.getElementById('adm-modal-msg').innerText = msg;
            const container = document.getElementById('adm-modal-btn-container');
            container.innerHTML = '';

            const okBtn = document.createElement('button');
            okBtn.className = 'btn-adm-ok';
            okBtn.innerText = '確 定';
            okBtn.onclick = () => {
                document.getElementById('adm-modal-screen').style.display = 'none';
                if(onConfirm) onConfirm();
            };

            if (isConfirmType) {
                const cancelBtn = document.createElement('button');
                cancelBtn.className = 'btn-adm-cancel';
                cancelBtn.innerText = '取 消';
                cancelBtn.onclick = () => { document.getElementById('adm-modal-screen').style.display = 'none'; };
                container.appendChild(cancelBtn);
            }
            container.appendChild(okBtn);
            document.getElementById('adm-modal-screen').style.display = 'flex';
        }

        window.togglePasswordVisibility = function() {
            const passInput = document.getElementById('loginPass');
            if (passInput.type === "password") { passInput.type = "text"; } else { passInput.type = "password"; }
        }

        window.handleLogin = function(event) {
            event.preventDefault();
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (allowedUsers[user] && allowedUsers[user] === pass) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-admin-content').style.display = 'block';
                document.getElementById('current-user-display').innerText = user;
                startDatabaseListening();
            } else {
                showAdminModal('認證失敗', '帳號或密碼錯誤。');
            }
        }

        function startDatabaseListening() {
            onValue(ref(db, 'products'), (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('products-list-view');
                const countSpan = document.getElementById('prod-count');
                if (!data) { container.innerHTML = ''; countSpan.innerText = "0"; return; }
                const keys = Object.keys(data);
                countSpan.innerText = keys.length;
                container.innerHTML = keys.map(key => `
                    <div class="product-card">
                        <button class="btn-delete" onclick="deleteProduct('${key}')">✕</button>
                        <img src="${data[key].image || ''}">
                        <div class="prod-name">${data[key].name}</div>
                        <div class="prod-price">HKD $${data[key].price}</div>
                    </div>
                `).join('');
            });

            onValue(ref(db, 'users'), (snapshot) => {
                const data = snapshot.val();
                const crmView = document.getElementById('crm-users-view');
                if (!data) {
                    crmView.innerHTML = '<tr><td colspan="6" style="color:#999; text-align:center;">目前無任何註冊會員</td></tr>';
                    return;
                }
                crmView.innerHTML = Object.keys(data).map(key => {
                    const u = data[key];
                    return `
                        <tr>
                            <td style="font-weight:bold; color:var(--caramel-light);">${u.memberNumb}</td>
                            <td>${u.lastName}${u.firstName}</td>
                            <td>${u.phone}</td>
                            <td>${u.registerDate || '未記載'}</td>
                            <td>
                                <input type="text" class="inline-edit-input" id="birth-${key}" value="${u.birthday}">
                                <button class="btn-save-inline" onclick="adminModifyBirthday('${key}')">修改</button>
                            </td>
                            <td>
                                <button class="btn-kick" onclick="adminDeleteUser('${key}', '${u.lastName}${u.firstName}')">註銷帳號</button>
                            </td>
                        </tr>
                    `;
                }).join('');
            });
        }

        window.adminModifyBirthday = function(phoneKey) {
            const newBirth = document.getElementById(`birth-${phoneKey}`).value.trim();
            if(!newBirth) { showAdminModal('警告', '生日不可為空！'); return; }
            const updates = {};
            updates[`/users/${phoneKey}/birthday`] = newBirth;
            update(ref(db), updates).then(() => {
                showAdminModal('變更完成', '會員出生日期已成功強制修改！');
            }).catch(err => showAdminModal('失敗', '修改失敗。'));
        }

        window.adminDeleteUser = function(phoneKey, userName) {
            showAdminModal('強制註銷確認', `確定要「強制註銷並刪除」會員【${userName}】的帳號嗎？此動作無法還原。`, () => {
                remove(ref(db, `users/${phoneKey}`)).then(() => {
                    showAdminModal('註銷成功', `會員【${userName}】已被移出系統。`);
                }).catch(err => showAdminModal('失敗', '註銷失敗。'));
            }, true);
        }

        window.previewImage = function(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageBase64 = e.target.result;
                    document.getElementById('img-preview').src = currentImageBase64;
                    document.getElementById('img-preview').style.display = 'block';
                    document.getElementById('upload-hint').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }

        window.handleFormSubmit = function(event) {
            event.preventDefault();
            set(ref(db, 'admin_auth'), globalAdminToken).then(() => {
                return set(ref(db, `products/${Date.now()}`), {
                    name: document.getElementById('prodName').value,
                    price: parseInt(document.getElementById('prodPrice').value),
                    image: currentImageBase64
                });
            }).then(() => {
                showAdminModal('上架成功', '商品安全上架成功！', () => {
                    document.getElementById('add-product-form').reset();
                    document.getElementById('img-preview').style.display = 'none';
                    document.getElementById('upload-hint').style.display = 'block';
                    currentImageBase64 = "";
                });
            });
        }

        window.deleteProduct = function(key) {
            showAdminModal('商品下架', '確定要下架此商品嗎？', () => {
                set(ref(db, 'admin_auth'), globalAdminToken).then(() => {
                    return remove(ref(db, `products/${key}`));
                });
            }, true);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma_bakery | 最高管理核心平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1e3932;
            --secondary-color: #d4e9e2;
            --accent-color: #cba258;
            --text-dark: #212529;
            --bg-light: #f8f9fa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', 'Noto Serif TC', serif; background-color: #f4f2ed; color: var(--text-dark); min-height: 100vh; }
        
        /* 嚴格驗證覆蓋層 */
        #admin-auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(30,57,50,0.8), rgba(30,57,50,0.8)), url('https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=1920&q=80') center/cover;
            z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        .auth-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 90%; max-width: 400px; text-align: center; }
        .auth-title { font-size: 24px; font-weight: 700; color: var(--primary-color); margin-bottom: 5px; }
        .auth-subtitle { font-size: 11px; color: var(--accent-color); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--primary-color); margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .btn-login { width: 100%; padding: 13px; background-color: var(--primary-color); color: white; border: none; border-radius: 30px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-login:hover { background-color: #132521; }
        #error-msg { color: #dc3545; font-size: 13px; margin-top: 10px; display: none; font-weight: 600; }

        /* 主系統架構 */
        #admin-system { display: none; }
        header { background-color: var(--primary-color); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-area { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 700; letter-spacing: 1px; }
        .container { max-width: 1300px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 400px 1fr; gap: 40px; }
        
        /* 表單面板 */
        .panel { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e1ded7; height: fit-content; }
        .panel-title { font-family: 'Noto Serif TC', serif; font-size: 20px; color: var(--primary-color); margin-bottom: 20px; border-bottom: 2px solid var(--accent-color); padding-bottom: 8px; }
        .form-select, .form-textarea { width: 100%; padding: 11px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-bottom: 15px; background: #fbfbfb; }
        .form-textarea { height: 80px; resize: none; }
        
        .btn-submit { width: 100%; padding: 13px; background-color: var(--primary-color); color: white; border: none; border-radius: 30px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-submit:hover { background-color: #132521; }

        /* 右側清單 */
        .list-title { font-family: 'Noto Serif TC', serif; font-size: 22px; color: var(--primary-color); margin-bottom: 20px; }
        .product-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e1ded7; }
        .product-table th { background-color: var(--primary-color); color: white; text-align: left; padding: 14px; font-size: 14px; font-weight: 600; }
        .product-table td { padding: 14px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; }
        .table-img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; background: #eee; }
        .btn-delete { padding: 6px 12px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-delete:hover { background-color: #bd2130; }
    </style>
</head>
<body>

    <div id="admin-auth-overlay">
        <div class="auth-box">
            <div class="auth-title">Aroma_bakery</div>
            <div class="auth-subtitle">最高核心控制台</div>
            <form onsubmit="handleAdminLogin(event); return false;">
                <div class="input-group">
                    <label>管理員內部識別號</label>
                    <input type="text" id="admin-username" required placeholder="請輸入管理號碼">
                </div>
                <div class="input-group">
                    <label>安全存取密碼</label>
                    <input type="password" id="admin-password" required placeholder="請輸入安全性密碼">
                </div>
                <button type="submit" class="btn-login">安全鏈結登入</button>
                <div id="error-msg">帳號或安全性密碼有誤，拒絕存取。</div>
            </form>
        </div>
    </div>

    <div id="admin-system">
        <header>
            <div class="logo-area">AROMA 最高主控面板</div>
            <div style="font-size: 14px; color: var(--secondary-color);">身份狀態：安全管理員 (唯寫權限已解鎖)</div>
        </header>
        
        <div class="container">
            <div class="panel">
                <div class="panel-title">全新上架商品</div>
                <form onsubmit="saveProduct(event); return false;">
                    <div class="input-group">
                        <label>商品名稱</label>
                        <input type="text" id="product-name" required placeholder="例：法式焦糖可頌">
                    </div>
                    <div class="input-group">
                        <label>販售價格 (HK$)</label>
                        <input type="number" id="product-price" required placeholder="例：38">
                    </div>
                    <div class="input-group">
                        <label>商品分類</label>
                        <select id="product-category" class="form-select">
                            <option value="飲品">飲品類 / Drinks</option>
                            <option value="甜點">甜點類 / Desserts</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>商品圖片網址</label>
                        <input type="url" id="product-img" required placeholder="請貼上圖片網址 (https://...)">
                    </div>
                    <div class="input-group">
                        <label>商品詳情描述</label>
                        <textarea id="product-detail" class="form-textarea" placeholder="輸入商品特色..."></textarea>
                    </div>
                    <button type="submit" class="btn-submit">確認儲存並即時上架</button>
                </form>
            </div>

            <div>
                <div class="list-title">目前線上運作商品目錄</div>
                <table class="product-table">
                    <thead>
                        <tr>
                            <th style="width: 80px;">照片</th>
                            <th>商品名稱</th>
                            <th style="width: 100px;">分類</th>
                            <th style="width: 100px;">價格</th>
                            <th style="width: 80px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="product-list-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
            authDomain: "aroma-bakery-492fa.firebaseapp.com",
            databaseURL: "https://aroma-bakery-492fa-default-rtdb.firebaseio.com",
            projectId: "aroma-bakery-492fa",
            storageBucket: "aroma-bakery-492fa.firebasestorage.app",
            messagingSenderId: "1060567946315",
            appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // 嚴格管理員登入
        window.handleAdminLogin = function(e) {
            if(e && e.preventDefault) e.preventDefault();
            const u = document.getElementById('admin-username').value.trim();
            const p = document.getElementById('admin-password').value.trim();
            
            if (u === 'admin01' && p === 'admin01') {
                signInWithEmailAndPassword(auth, "admin01@aroma.com", "admin01SuperPassword")
                    .then(() => {
                        alert('🎉 【嚴格驗證通過】管理員已成功帶權限連線！');
                        document.getElementById('admin-auth-overlay').style.display = 'none';
                        document.getElementById('admin-system').style.display = 'block';
                        loadProductsData();
                    })
                    .catch((error) => {
                        console.error("Firebase 連線失敗:", error);
                        alert(`❌ 【安全拒絕】無法登入 Firebase！\n錯誤代碼: ${error.code}\n請確認 Authentication 已建立該管理員。`);
                    });
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        };

        // 儲存並即時上架商品
        window.saveProduct = function(e) {
            if(e && e.preventDefault) e.preventDefault();
            const name = document.getElementById('product-name').value.trim();
            const price = document.getElementById('product-price').value;
            const category = document.getElementById('product-category').value;
            const imgUrl = document.getElementById('product-img').value.trim();
            const detail = document.getElementById('product-detail').value.trim();

            const productId = 'prod_' + Date.now();
            
            set(ref(database, 'products/' + productId), {
                id: productId,
                name,
                price: parseInt(price),
                category,
                detail,
                photoUrl: imgUrl
            }).then(() => {
                alert('🟢 商品已成功通過安全規則，正式在全線平台上架！');
                document.getElementById('product-name').value = '';
                document.getElementById('product-price').value = '';
                document.getElementById('product-img').value = '';
                document.getElementById('product-detail').value = '';
            }).catch((err) => {
                alert('❌ 安全防禦封鎖：寫入資料庫失敗，權限被拒。' + err.message);
            });
        };

        // 即時監聽與加載資料庫商品目錄
        function loadProductsData() {
            onValue(ref(database, 'products'), (snapshot) => {
                const listBody = document.getElementById('product-list-body');
                if(!listBody) return;
                listBody.innerHTML = '';
                const data = snapshot.val();
                
                if (!data) {
                    listBody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#999;">目前沒有任何上架商品</td></tr>';
                    return;
                }

                for (let id in data) {
                    const p = data[id];
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><img class="table-img" src="${p.photoUrl || ''}" style="width:50px; height:50px; object-fit:cover; border-radius:4px;"></td>
                        <td style="font-weight:600; color:var(--primary-color);">${p.name}</td>
                        <td>${p.category}</td>
                        <td style="font-weight:600; color:var(--accent-color);">HK$${p.price}</td>
                        <td><button class="btn-delete" onclick="deleteProduct('${p.id}')">下架</button></td>
                    `;
                    listBody.appendChild(tr);
                }
            });
        }

        // 商品下架（徹底剷除）
        window.deleteProduct = function(id) {
            if (confirm('🚨 確定要將此商品從全線下架並徹底剷除嗎？')) {
                remove(ref(database, 'products/' + id))
                    .then(() => {
                        alert('🗑️ 商品已徹底從雲端資料庫抹除。');
                    })
                    .catch((err) => alert('❌ 操作拒絕：' + err.message));
            }
        };
    </script>
</body>
</html>

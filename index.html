<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma_bakery | 顧客中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1e3932;
            --accent-color: #cba258;
            --text-color: #212529;
            --bg-cream: #f4f2ed;
            --dark-overlay: rgba(15, 23, 20, 0.7);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', 'Noto Serif TC', serif; background-color: var(--bg-cream); color: var(--text-color); min-height: 100vh; }
        
        /* 歡迎封面與登入 */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(var(--dark-overlay), var(--dark-overlay)), url('https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover; z-index: 1000; display: flex; justify-content: center; align-items: center;
        }
        .login-box { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); width: 90%; max-width: 400px; text-align: center; }
        .brand-title { font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight: 700; color: var(--primary-color); margin-bottom: 5px; }
        .brand-subtitle { font-size: 12px; color: #6c757d; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-size: 12px; font-weight: 600; color: #495057; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        input:focus { outline: none; border-color: var(--primary-color); }
        
        .btn-submit { width: 100%; padding: 14px; background-color: var(--primary-color); color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 1px; }
        .toggle-auth { margin-top: 15px; font-size: 13px; color: var(--accent-color); cursor: pointer; text-decoration: underline; }
        .error-message { color: #b02a37; font-size: 13px; margin-top: 15px; display: none; }

        /* 主頁面 */
        #main-dashboard { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #e1ded7; margin-bottom: 30px; }
        .nav-logo { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 700; color: var(--primary-color); }
        .btn-logout { background: none; border: none; color: #b02a37; font-weight: 600; cursor: pointer; font-size: 14px; }
        
        .profile-card { background: white; padding: 30px; border-radius: 8px; border: 1px solid #e1ded7; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .profile-card h2 { font-family: 'Noto Serif TC', serif; color: var(--primary-color); margin-bottom: 20px; }
        
        /* 彈窗 */
        .custom-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .custom-modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: white; padding: 25px; border-radius: 6px; max-width: 350px; width: 90%; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-box">
            <div class="brand-title">Aroma_bakery</div>
            <div class="brand-subtitle" id="auth-box-title">Customer Sign In</div>
            
            <form id="auth-form" onsubmit="handleAuth(event); return false;">
                <div class="form-group">
                    <label>電子郵件</label>
                    <input type="email" id="auth-email" required placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="auth-password" required placeholder="請輸入密碼">
                </div>
                <div id="register-fields" style="display: none;">
                    <div class="form-group"><label>姓氏</label><input type="text" id="reg-lastname" placeholder="例如：陳"></div>
                    <div class="form-group"><label>名字</label><input type="text" id="reg-firstname" placeholder="例如：大文"></div>
                    <div class="form-group"><label>電話號碼</label><input type="tel" id="reg-phone" placeholder="例如：91234567"></div>
                    <div class="form-group"><label>生日月份</label><input type="text" id="reg-birthday" placeholder="例如：05-12"></div>
                </div>
                
                <button type="submit" class="btn-submit" id="btn-submit-text">登入會員</button>
                <div class="toggle-auth" id="btn-toggle-mode" onclick="toggleAuthMode()">沒有帳戶？立即註冊</div>
                <div id="error-msg" class="error-message"></div>
            </form>
        </div>
    </div>

    <div id="main-dashboard">
        <nav>
            <div class="nav-logo">Aroma_bakery</div>
            <button class="btn-logout" onclick="handleLogout()">安全登出</button>
        </nav>
        <div class="profile-card">
            <h2>尊貴會員資訊</h2>
            <div style="line-height: 2; font-size: 15px;">
                <p><strong>會員姓名：</strong><span id="lbl-name">載入中...</span></p>
                <p><strong>聯絡電話：</strong><span id="lbl-phone">載入中...</span></p>
                <p><strong>生日資訊：</strong><span id="lbl-birthday">載入中...</span></p>
            </div>
        </div>
    </div>

    <div class="custom-modal" id="alert-modal">
        <div class="modal-content">
            <p id="alert-text" style="font-weight:600; color:#1e3932; line-height:1.6;"></p>
            <button class="btn-submit" style="margin-top:20px; padding:10px;" onclick="closeAlert()">確定</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
            authDomain: "aroma-bakery-492fa.firebaseapp.com",
            databaseURL: "https://aroma-bakery-492fa-default-rtdb.firebaseio.com",
            projectId: "aroma-bakery-492fa",
            storageBucket: "aroma-bakery-492fa.firebasestorage.app",
            messagingSenderId: "1060567946315",
            appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        let isLoginMode = true;

        window.showCustomAlert = function(text) {
            document.getElementById('alert-text').innerText = text;
            document.getElementById('alert-modal').classList.add('active');
        };
        window.closeAlert = function() {
            document.getElementById('alert-modal').classList.remove('active');
        };

        window.toggleAuthMode = function() {
            isLoginMode = !isLoginMode;
            document.getElementById('register-fields').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('auth-box-title').innerText = isLoginMode ? 'Customer Sign In' : 'Create Account';
            document.getElementById('btn-submit-text').innerText = isLoginMode ? '登入會員' : '註冊新帳戶';
            document.getElementById('btn-toggle-mode').innerText = isLoginMode ? '沒有帳戶？立即註冊' : '已有帳戶？返回登入';
            document.getElementById('error-msg').style.display = 'none';
        };

        window.handleAuth = function(e) {
            if(e && e.preventDefault) e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            // 防呆：防止管理員跑錯到顧客前台登入
            if (isLoginMode && email === 'admin02@aroma.com') {
                window.showCustomAlert('此帳號為系統管理員，請移步至管理後台登入！');
                return;
            }

            if (isLoginMode) {
                signInWithEmailAndPassword(auth, email, pass)
                    .then((userCredential) => {
                        loadUserProfile(userCredential.user.uid);
                    })
                    .catch(err => {
                        errorMsg.innerText = "登入失敗：" + err.message;
                        errorMsg.style.display = 'block';
                    });
            } else {
                createUserWithEmailAndPassword(auth, email, pass)
                    .then((userCredential) => {
                        const uid = userCredential.user.uid;
                        set(ref(database, 'users/' + uid), {
                            lastName: document.getElementById('reg-lastname').value.trim(),
                            firstName: document.getElementById('reg-firstname').value.trim(),
                            phone: document.getElementById('reg-phone').value.trim(),
                            birthday: document.getElementById('reg-birthday').value.trim(),
                            role: 'customer' // 預設新註冊者全為顧客角色
                        }).then(() => {
                            loadUserProfile(uid);
                        });
                    })
                    .catch(err => {
                        errorMsg.innerText = "註冊失敗：" + err.message;
                        errorMsg.style.display = 'block';
                    });
            }
        };

        function loadUserProfile(uid) {
            onValue(ref(database, 'users/' + uid), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('lbl-name').innerText = `${data.lastName || ''}${data.firstName || ''}`;
                    document.getElementById('lbl-phone').innerText = data.phone || '未填寫';
                    document.getElementById('lbl-birthday').innerText = data.birthday || '未填寫';
                    
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('main-dashboard').style.display = 'block';
                }
            });
        }

        window.handleLogout = function() {
            signOut(auth).then(() => {
                location.reload();
            });
        };
    </script>
</body>
</html>
